<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZoneSport - Contact</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>ZoneSport</h1>
        <p>Votre boutique de sport en ligne</p>
    </header>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="produits.html">Produits</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">

        <h2>Envoyez-nous un message</h2>

        <form>

            <input type="text"
                   placeholder="Nom complet"
                   required>

            <input type="email"
                   placeholder="Adresse email"
                   required>

            <textarea rows="6"
                      placeholder="Message"
                      required></textarea>

            <button type="submit">Envoyer</button>

            <button type="reset">Annuler</button>

        </form>

    </div>

    <footer>
        <p>© 2026 ZoneSport. Tous droits réservés</p>
    </footer>

</body>
</html>
